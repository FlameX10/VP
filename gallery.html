<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | EDC-VIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505',
                        charcoal: '#0a0a0a',
                        gold: {
                            50: '#fefce8',
                            100: '#fef9c3',
                            200: '#fef08a',
                            300: '#D4AF37',
                            400: '#bf953f',
                            500: '#b38728',
                            600: '#aa771c',
                            700: '#8b6914',
                            800: '#6f5411',
                            900: '#4a3609',
                        }
                    },
                    fontFamily: {
                        header: ['Cinzel Decorative', 'serif'],
                        body: ['Cormorant Garamond', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(ellipse at top, #1a1a1a 0%, #0a0a0a 50%, #000000 100%);
            color: #e5e5e5;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(191, 149, 63, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a; 
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #bf953f, #b38728);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #D4AF37, #bf953f);
        }

        .text-gold-metallic {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* Particle Background */
        #particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Glowing Text Effect */
        .glow-text {
            text-shadow: 
                0 0 10px rgba(212, 175, 55, 0.5),
                0 0 20px rgba(212, 175, 55, 0.3),
                0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* Masonry Grid */
        .masonry-grid {
            column-count: 1;
            column-gap: 1rem;
        }

        @media (min-width: 640px) {
            .masonry-grid {
                column-count: 2;
                column-gap: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .masonry-grid {
                column-count: 3;
                column-gap: 2rem;
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
            perspective: 1000px;
        }

        @media (min-width: 640px) {
            .masonry-item {
                margin-bottom: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .masonry-item {
                margin-bottom: 2rem;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Gallery Card */
        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(212, 175, 55, 0.1);
        }

        .gallery-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            border-radius: 16px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
            filter: blur(8px);
        }

        .gallery-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(212, 175, 55, 0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }

        .gallery-card:hover::before {
            opacity: 1;
            animation: rotate-border 4s linear infinite;
        }

        .gallery-card:hover::after {
            opacity: 1;
        }

        @keyframes rotate-border {
            0% {
                filter: blur(8px) hue-rotate(0deg);
            }
            100% {
                filter: blur(8px) hue-rotate(360deg);
            }
        }

        .gallery-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 
                0 20px 60px rgba(212, 175, 55, 0.5),
                0 0 0 1px rgba(212, 175, 55, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .gallery-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: brightness(0.9) contrast(1.1);
        }

        .gallery-card:hover img {
            transform: scale(1.1) rotate(1deg);
            filter: brightness(1.1) contrast(1.2);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10, 10, 10, 0.98), rgba(10, 10, 10, 0.5) 40%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 2rem;
        }

        .gallery-card:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay div {
            transform: translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery-card:hover .gallery-overlay div {
            transform: translateY(0);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            backdrop-filter: blur(20px);
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                backdrop-filter: blur(0px);
            }
            to { 
                opacity: 1;
                backdrop-filter: blur(20px);
            }
        }

        .lightbox-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 
                0 0 80px rgba(212, 175, 55, 0.4),
                0 0 40px rgba(212, 175, 55, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.8);
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(212, 175, 55, 0.2);
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.7) rotate(-2deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(212, 175, 55, 0.3);
        }

        .lightbox-close:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 
                0 6px 30px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(212, 175, 55, 0.5);
        }

        /* Navigation Arrows */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(212, 175, 55, 0.3);
        }

        .lightbox-nav:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-50%) scale(1.15);
            box-shadow: 
                0 6px 30px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(212, 175, 55, 0.5);
        }

        .lightbox-prev {
            left: 2rem;
        }

        .lightbox-prev:hover {
            transform: translateY(-50%) translateX(-5px) scale(1.15);
        }

        .lightbox-next {
            right: 2rem;
        }

        .lightbox-next:hover {
            transform: translateY(-50%) translateX(5px) scale(1.15);
        }

        /* Floating Ornaments */
        .ornament {
            position: fixed;
            color: rgba(212, 175, 55, 0.1);
            pointer-events: none;
            z-index: 1;
            transition: transform 0.3s ease-out;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #D4AF37;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .back-btn:hover {
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transform: translateX(-4px);
        }

        /* Loading Animation */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

        <img src="" alt="" class="lightbox-image" id="lightbox-image">

            { src: 'src/assets/images/Corpstrata_4.jpeg', alt: 'Corporate Strategy 4' },
            
            // Business Plan
            { src: 'src/assets/images/bplan1.png', alt: 'Business Plan 1' },
            { src: 'src/assets/images/Bplan2.png', alt: 'Business Plan 2' },

            // CP Images
            { src: 'src/assets/images/cp.png', alt: 'CP Event' },

            { src: 'src/assets/images/cp_11.png', alt: 'CP 11' },
            { src: 'src/assets/images/cp_12.png', alt: 'CP 12' },
        ];

        // Shuffle array function
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Randomize gallery data
        const randomizedGallery = shuffleArray(galleryData);

        // Initialize
        lucide.createIcons();

        const galleryGrid = document.getElementById('gallery-grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxClose = document.getElementById('lightbox-close');
        const lightboxPrev = document.getElementById('lightbox-prev');
        const lightboxNext = document.getElementById('lightbox-next');

        let currentImageIndex = 0;

        // Render Gallery
        function renderGallery() {
            galleryGrid.innerHTML = '';
            galleryGrid.classList.add('loading');

            // Update image count
            const imageCountEl = document.getElementById('image-count');
            if (imageCountEl) {
                imageCountEl.textContent = `${randomizedGallery.length} MEMORIES`;
            }

            setTimeout(() => {
                randomizedGallery.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'masonry-item gallery-card';
                    card.style.animationDelay = `${index * 0.04}s`;
                    card.innerHTML = `
                        <img src="${item.src}" alt="${item.alt}" loading="lazy">
                        <div class="gallery-overlay">
                            <div class="text-gold-300 font-header text-xs tracking-widest uppercase">
                                ${item.alt}
                            </div>
                        </div>
                    `;
                    card.addEventListener('click', () => openLightbox(index));
                    galleryGrid.appendChild(card);
                });

                galleryGrid.classList.remove('loading');
                lucide.createIcons();
            }, 200);
        }

        // Lightbox Functions
        function openLightbox(index) {
            currentImageIndex = index;
            lightboxImage.src = randomizedGallery[index].src;
            lightboxImage.alt = randomizedGallery[index].alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % randomizedGallery.length;
            lightboxImage.src = randomizedGallery[currentImageIndex].src;
            lightboxImage.alt = randomizedGallery[currentImageIndex].alt;
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + randomizedGallery.length) % randomizedGallery.length;
            lightboxImage.src = randomizedGallery[currentImageIndex].src;
            lightboxImage.alt = randomizedGallery[currentImageIndex].alt;
        }

        // Event Listeners
        lightboxClose.addEventListener('click', closeLightbox);
        lightboxNext.addEventListener('click', nextImage);
        lightboxPrev.addEventListener('click', prevImage);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // Particle Background
        const canvas = document.getElementById('particle-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.3 + 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(100, Math.floor(window.innerWidth / 10));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        const opacity = (1 - distance / 100) * 0.15;
                        ctx.strokeStyle = `rgba(212, 175, 55, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // Initial Setup
        resizeCanvas();
        initParticles();
        animateParticles();
        renderGallery();

        // Mouse tracking for gallery cards
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.gallery-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', `${x}%`);
                card.style.setProperty('--mouse-y', `${y}%`);
                
                // Add 3D tilt effect
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const deltaX = (e.clientX - centerX) / (rect.width / 2);
                const deltaY = (e.clientY - centerY) / (rect.height / 2);
                
                if (Math.abs(deltaX) < 1 && Math.abs(deltaY) < 1) {
                    const rotateY = deltaX * 5;
                    const rotateX = -deltaY * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-12px) scale(1.03)`;
                }
            });
        });

        // Reset card transform when mouse leaves
        document.querySelectorAll('.gallery-card').forEach(card => {
            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });

        // Add parallax effect to ornaments
        document.addEventListener('mousemove', (e) => {
            const ornaments = document.querySelectorAll('.ornament');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            ornaments.forEach((ornament, index) => {
                const speed = (index + 1) * 10;
                const xOffset = (x - 0.5) * speed;
                const yOffset = (y - 0.5) * speed;
                ornament.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });
    </script>

</body>
</html>
